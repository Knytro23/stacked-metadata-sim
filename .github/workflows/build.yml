name: Build — Windows & macOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow piexif fonttools pyinstaller

      - name: Rebuild PyInstaller bootloader (breaks AV signature)
        run: |
          git clone --depth 1 https://github.com/pyinstaller/pyinstaller.git _pyi_src
          cd _pyi_src\bootloader
          python waf all --target-arch=64bit
          cd ..
          pip install .
        shell: cmd

      - name: Build Windows .exe
        run: pyinstaller stacked.spec

      - name: Rename for platform
        run: mv dist/Stacked_MetadataSim.exe dist/Stacked_MetadataSim_Windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stacked_MetadataSim_windows
          path: dist/Stacked_MetadataSim_Windows.exe

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Stacked_MetadataSim_Windows.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow piexif pyinstaller fonttools

      - name: Build macOS .app
        run: pyinstaller stacked.spec

      - name: Zip macOS app
        run: cd dist && zip -r Stacked_MetadataSim_macOS.zip Stacked_MetadataSim.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stacked_MetadataSim_macOS
          path: dist/Stacked_MetadataSim_macOS.zip

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Stacked_MetadataSim_macOS.zip
