name: Build — Windows & macOS

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow piexif pyinstaller

      - name: Build Windows .exe
        run: |
          pyinstaller --onefile --windowed `
            --name "Stacked_MetadataSim" `
            stacked_metadata_sim.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stacked_MetadataSim_windows
          path: dist/Stacked_MetadataSim.exe

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Stacked_MetadataSim.exe
          name: ${{ github.ref_name }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow piexif pyinstaller

      - name: Build macOS .app
        run: |
          pyinstaller --onedir --windowed \
            --name "Stacked_MetadataSim" \
            stacked_metadata_sim.py

      - name: Zip macOS app
        run: |
          cd dist
          zip -r Stacked_MetadataSim_macOS.zip Stacked_MetadataSim.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Stacked_MetadataSim_macOS
          path: dist/Stacked_MetadataSim_macOS.zip

      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Stacked_MetadataSim_macOS.zip
          name: ${{ github.ref_name }}
